<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/images/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="description" content="Your asn1click account — profile, saved aliases and messages, plan and settings." />
    <title>asn1click — Account</title>
    <!-- No-flash theme: apply saved theme before paint (shares the v2x.tools key) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('v2x-theme');
          var dark = t ? t === 'dark' : true;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
